<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>צ'ק ליסט הדרכת עובד חדש</title>
<style>
:root{--ink:#1d2939;--muted:#667085;--line:#d0d5dd;--bg:#f5f7fb;--card:#ffffff;--accent:#2563eb;--accent2:#0f766e;--soft:#eaf2ff;--ok:#16a34a;}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,'Noto Sans Hebrew','Segoe UI',sans-serif;background:linear-gradient(135deg,#f7fafc,#eef4ff);color:var(--ink);line-height:1.45}

/* ── Screen ── */
.page{width:210mm;min-height:297mm;margin:18px auto;background:white;padding:12mm;box-shadow:0 10px 30px rgba(15,23,42,.12);border-radius:18px;position:relative;overflow:hidden}
.header{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;border-bottom:3px solid var(--accent);padding-bottom:14px;margin-bottom:16px}
.title h1{margin:0;font-size:28px;color:#0f172a}.title p{margin:4px 0 0;color:var(--muted);font-size:14px}
.badge{width:86px;height:86px;border-radius:24px;background:var(--soft);display:grid;place-items:center;color:var(--accent)}
.details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:14px 0 18px}
.field{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fcfcfd}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px}
.field input{width:100%;border:0;outline:0;font-size:16px;background:transparent;color:var(--ink);padding:2px 0}
.toolbar{display:flex;gap:8px;justify-content:flex-start;margin:0 0 14px;position:sticky;top:8px;z-index:5}
.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer;background:var(--accent);color:white;box-shadow:0 3px 10px rgba(37,99,235,.22)}
.btn.secondary{background:#0f766e}.btn.light{background:#475467}

/* ── Section layout: visual left, content right ── */
.section{display:grid;grid-template-columns:96px 1fr;gap:16px;border:1px solid var(--line);border-radius:18px;background:var(--card);padding:14px;margin:12px 0;break-inside:avoid;box-shadow:0 4px 14px rgba(15,23,42,.04)}
.visual{border-radius:18px;background:linear-gradient(180deg,#eef6ff,#f8fbff);display:grid;place-items:center;min-height:120px;opacity:.9}
.visual svg{width:66px;height:66px;color:var(--accent2);opacity:.7}
.section:nth-of-type(odd) .visual svg{color:var(--accent)}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.num{min-width:32px;height:32px;border-radius:10px;background:var(--soft);color:var(--accent);display:grid;place-items:center;font-weight:800}
.sec-head h2{font-size:18px;margin:0;color:#101828}

/* ── Items: always 2 columns on screen ── */
.items{display:grid;grid-template-columns:1fr 1fr;gap:7px 18px}
.item{display:flex;gap:8px;align-items:flex-start;min-height:28px}
.item input[type=checkbox]{width:18px;height:18px;accent-color:var(--ok);margin-top:2px;flex:0 0 auto}
.item span{font-size:14px}
.note{grid-column:1/-1;margin-top:6px}
.note textarea{width:100%;min-height:48px;border:1px solid var(--line);border-radius:12px;padding:8px;font-family:inherit;resize:vertical;background:#fcfcfd}

/* ── Footer / signatures ── */
.footer{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;break-inside:avoid}
.signature{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fcfcfd;min-height:92px}
.signature input{width:100%;border:0;border-bottom:1px solid #98a2b3;background:transparent;outline:0;padding:8px 0;font-size:15px}
.small{font-size:12px;color:var(--muted);margin-top:6px}

/* ── WACOM canvas block ── */
.sig-canvas-wrap{margin-top:8px}
.sig-canvas-wrap canvas{border:1px solid var(--line);border-radius:10px;touch-action:none;cursor:crosshair;background:white;display:block;width:100%;height:80px}
.sig-tools{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
.sig-tools button{border:0;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;background:#e2e8f0;color:#1d2939;font-weight:600}
.sig-tools label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.sig-tools select{font-size:12px;padding:3px 6px;border-radius:6px;border:1px solid var(--line)}

.watermark{position:absolute;left:-70px;top:160px;width:240px;height:240px;border-radius:50%;background:rgba(37,99,235,.035);z-index:0}
.content{position:relative;z-index:1}

/* ── Mobile ── */
@media(max-width:900px){
  .page{width:auto;margin:0;border-radius:0;padding:18px}
  .details{grid-template-columns:1fr}
  .section{grid-template-columns:72px 1fr}
  .items{grid-template-columns:1fr}
  .toolbar{position:static;flex-wrap:wrap}
  .footer{grid-template-columns:1fr}
}

/* ══════════════════════════════════════════
   PRINT  —  A4, scale content to fit page
   ══════════════════════════════════════════ */
@media print {
  @page { size:A4 portrait; margin:8mm; }

  html,body { background:white !important; margin:0; padding:0; }

  /* Force one A4 page container */
  .page {
    width:194mm;        /* 210mm − 2×8mm page margin */
    min-height:0;
    height:auto;
    margin:0;
    padding:6mm;
    box-shadow:none;
    border-radius:0;
    overflow:visible;
    /* Scale everything down so it fits on one page */
    font-size:11px;
  }

  .toolbar, .sig-tools, .btn { display:none !important; }

  /* Header */
  .header { padding-bottom:8px; margin-bottom:8px; }
  .title h1 { font-size:18px; }
  .title p  { font-size:11px; }
  .badge    { width:56px; height:56px; border-radius:14px; }
  .badge svg{ width:36px; height:36px; }

  /* Details row */
  .details { grid-template-columns:1fr 1fr 1fr; gap:6px; margin:8px 0 10px; }
  .field    { padding:6px; border-radius:8px; }
  .field label { font-size:10px; }
  .field input  { font-size:13px; }

  /* Sections */
  .section {
    grid-template-columns:58px 1fr;
    gap:8px;
    padding:6px 8px;
    margin:4px 0;
    border-radius:10px;
    box-shadow:none;
    break-inside:avoid;
  }
  .visual { min-height:72px; border-radius:10px; }
  .visual svg { width:38px; height:38px; }

  .sec-head { margin-bottom:4px; }
  .sec-head h2 { font-size:13px; }
  .num { min-width:22px; height:22px; font-size:11px; border-radius:6px; }

  /* Items — always 2 cols, compact */
  .items { grid-template-columns:1fr 1fr; gap:3px 10px; }
  .item  { min-height:20px; gap:5px; }
  .item span { font-size:11px; line-height:1.3; }
  .item input[type=checkbox] { width:13px; height:13px; margin-top:1px; }

  .note { margin-top:3px; }
  .note textarea { min-height:24px; padding:4px; font-size:10px; border-radius:6px; }

  /* Footer signatures */
  .footer { grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
  .signature { padding:8px; min-height:70px; border-radius:10px; }
  .signature strong { font-size:12px; }
  .signature input  { font-size:12px; padding:4px 0; }
  .small { font-size:10px; }

  /* Render WACOM canvas as image — handled by JS before print */
  .sig-canvas-wrap canvas { display:none !important; }
  .sig-canvas-wrap .print-sig-img {
    display:block !important;
    width:100%;
    height:70px;
    border:1px solid var(--line);
    border-radius:8px;
    object-fit:contain;
  }

  .watermark { display:none; }
}
</style>

<script>
/* ── WACOM signature pad ── */
(function(){
  var canvas = document.getElementById('sigCanvas');
  var ctx    = canvas.getContext('2d');
  var ink    = '#1a1aee';
  var drawing = false, lx = 0, ly = 0;

  window.updateSigColor = function(){ ink = document.getElementById('sigColor').value; };
  window.clearSig = function(){ ctx.clearRect(0,0,canvas.width,canvas.height); };

  function pos(e){
    var r = canvas.getBoundingClientRect();
    var sx = canvas.width  / r.width;
    var sy = canvas.height / r.height;
    var cx = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
    var cy = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
    return { x:(cx-r.left)*sx, y:(cy-r.top)*sy };
  }

  canvas.addEventListener('pointerdown', function(e){
    drawing = true; canvas.setPointerCapture(e.pointerId);
    var p = pos(e); lx=p.x; ly=p.y;
    ctx.beginPath(); ctx.arc(lx,ly,0.8,0,Math.PI*2);
    ctx.fillStyle=ink; ctx.fill(); e.preventDefault();
  });
  canvas.addEventListener('pointermove', function(e){
    if(!drawing) return;
    var p = pos(e);
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y);
    ctx.strokeStyle=ink; ctx.lineWidth=1.8; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.stroke(); lx=p.x; ly=p.y; e.preventDefault();
  });
  canvas.addEventListener('pointerup',     function(){ drawing=false; });
  canvas.addEventListener('pointercancel', function(){ drawing=false; });
})();

/* ── Before print: bake canvas → img ── */
function prepareForPrint(){
  var canvas = document.getElementById('sigCanvas');
  var img    = document.getElementById('sigPrintImg');
  img.src = canvas.toDataURL('image/png');
}

function doPrint(){
  prepareForPrint();
  window.print();
}

/* ── Serialize & save ── */
function serializeValues(){
  document.querySelectorAll('input, textarea').forEach(function(el){
    if(el.type==='checkbox'){
      if(el.checked) el.setAttribute('checked','checked');
      else el.removeAttribute('checked');
    } else {
      el.setAttribute('value', el.value);
      if(el.tagName==='TEXTAREA') el.textContent = el.value;
    }
  });
  // save canvas data-url as attribute on img
  var canvas = document.getElementById('sigCanvas');
  var img    = document.getElementById('sigPrintImg');
  var dataUrl = canvas.toDataURL('image/png');
  img.setAttribute('data-sig', dataUrl);
}

function saveFilledHtml(){
  serializeValues();
  var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  var blob = new Blob([html], {type:'text/html;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'checklist_hadracha_filled.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ── On load: restore canvas from saved data-url ── */
window.addEventListener('load', function(){
  var img = document.getElementById('sigPrintImg');
  var saved = img && img.getAttribute('data-sig');
  if(saved && saved.length > 6){
    var canvas = document.getElementById('sigCanvas');
    var ctx    = canvas.getContext('2d');
    var image  = new Image();
    image.onload = function(){ ctx.drawImage(image, 0, 0); };
    image.src = saved;
  }
});

function clearForm(){
  if(confirm('לנקות את כל השדות והסימונים?')){
    document.querySelectorAll('input, textarea').forEach(function(el){
      if(el.type==='checkbox') el.checked = false;
      else if(el.name !== '') el.value = '';
    });
    clearSig();
  }
}

/* Also hook browser print button */
window.addEventListener('beforeprint', prepareForPrint);
</script>
<script>
/**
 * ═══════════════════════════════════════════════════
 *  config.js — הגדרות ארגוניות
 *  שנה כאן בלבד. כל הטפסים יתעדכנו אוטומטית.
 * ═══════════════════════════════════════════════════
 */

const ORG_CONFIG = {

  // ── פרטי הארגון ──────────────────────────────────
  orgName:  "מפעל מוגן שיקומי לבריאות הנפש, באר שבע – עמותת יחדיו",
  orgShort: "עמותת יחדיו",
  city:     "באר שבע",

  // ── מנהל (חתימה קבועה במסמכים) ──────────────────
  director: {
    name:  "אלכסנדר חטקביץ",
    title: "מנהל מפעל שיקומי לבריאות הנפש"
  },

  // ── עובדת סוציאלית (חתימה קבועה במסמכים) ────────
  socialWorker: {
    name:  "ליבי יוסופוב",
    title: "עובדת סוציאלית"
  },

  // ── מדריכים (רשימות נפתחות) ──────────────────────
  guides: [
    "אריסטרך קפוסטה",
    "שלום מימון",
    "אנדרי אברמוביץ",
    "רוזט פירוזה"
  ],

  // ── כל הצוות (לתיעוד שיחות וכד') ────────────────
  allStaff: [
    "אלכסנדר חטקביץ",
    "ליבי יוסופוב",
    "אריסטרך קפוסטה",
    "שלום מימון",
    "אנדרי אברמוביץ",
    "רוזט פירוזה"
  ],

  // ── קבצים ─────────────────────────────────────────
  // שנה כאן את הנתיבים לפי מבנה השרת שלך
  files: {
    // קובץ Excel עם נתוני מקבלי השירות
    excel: "מחלות רקע.xlsx",

    // לוגו העמותה — קובץ בתיקיית images/ או URL חיצוני
    logoOrg: "https://mnz.org.il/sites/www.mnz.org.il/files/logo-yachdav.png",

    // לוגו משרד הבריאות
    logoMinistry: "https://upload.wikimedia.org/wikipedia/he/thumb/f/fb/Israeli_Ministry_of_Health_logo.png/3840px-Israeli_Ministry_of_Health_logo.png"
  },

  // ── גדלי לוגואים במסמכים ─────────────────────────
  logoSizes: {
    orgHeight:      "50px",
    ministryHeight: "40px"
  }
};

/**
 * פונקציות עזר — נטענות אוטומטית בכל הטפסים
 */

// מילוי שם ארגון בכל מקום עם data-org="name"
function fillOrgNames() {
  document.querySelectorAll('[data-org="name"]').forEach(el => {
    el.textContent = ORG_CONFIG.orgName;
  });
  document.querySelectorAll('[data-org="short"]').forEach(el => {
    el.textContent = ORG_CONFIG.orgShort;
  });
  document.querySelectorAll('[data-org="city"]').forEach(el => {
    el.textContent = ORG_CONFIG.city;
  });
}

// מילוי שם מנהל ועו"ס בכל מקום עם data-staff
function fillStaffNames() {
  document.querySelectorAll('[data-staff="director"]').forEach(el => {
    el.textContent = ORG_CONFIG.director.name;
  });
  document.querySelectorAll('[data-staff="director-full"]').forEach(el => {
    el.textContent = ORG_CONFIG.director.name + ' – ' + ORG_CONFIG.director.title;
  });
  document.querySelectorAll('[data-staff="social-worker"]').forEach(el => {
    el.textContent = ORG_CONFIG.socialWorker.name;
  });
}

// בניית רשימה נפתחת של מדריכים
function buildGuidesSelect(selectEl, includeEmpty = true) {
  if (!selectEl) return;
  selectEl.innerHTML = '';
  if (includeEmpty) {
    const empty = document.createElement('option');
    empty.value = '';
    empty.textContent = 'בחר/י מדריך';
    selectEl.appendChild(empty);
  }
  ORG_CONFIG.guides.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    selectEl.appendChild(opt);
  });
}

// בניית רשימה נפתחת של כל הצוות
function buildAllStaffSelect(selectEl, includeEmpty = true, extraOptions = []) {
  if (!selectEl) return;
  selectEl.innerHTML = '';
  if (includeEmpty) {
    const empty = document.createElement('option');
    empty.value = '';
    empty.textContent = 'בחר...';
    selectEl.appendChild(empty);
  }
  ORG_CONFIG.allStaff.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    selectEl.appendChild(opt);
  });
  extraOptions.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.value || item;
    opt.textContent = item.label || item;
    selectEl.appendChild(opt);
  });
}

// האתחול מתבצע בתחתית הקובץ

// החלפת לוגואים בכל הטפסים
function fillLogos() {
  // לוגו עמותה
  document.querySelectorAll('[data-logo="org"]').forEach(img => {
    img.src    = ORG_CONFIG.files.logoOrg;
    img.style.height = ORG_CONFIG.logoSizes.orgHeight;
    img.style.width  = 'auto';
    img.style.objectFit = 'contain';
  });
  // לוגו משרד הבריאות
  document.querySelectorAll('[data-logo="ministry"]').forEach(img => {
    img.src    = ORG_CONFIG.files.logoMinistry;
    img.style.height = ORG_CONFIG.logoSizes.ministryHeight;
    img.style.width  = 'auto';
    img.style.objectFit = 'contain';
  });
}

// הוסף fillLogos לאתחול
document.addEventListener('DOMContentLoaded', function() {
  fillOrgNames();
  fillStaffNames();
  fillLogos();
});

</script>
</body>
